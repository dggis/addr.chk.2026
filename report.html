<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>보고 · 기초번호판 보고 시스템</title>
<link rel="icon" href="data:,">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="appbar">
  <div class="titles">
    <h1>주간 · 월간 보고</h1>
    <div class="sub" id="appSub">불러오는 중…</div>
  </div>
  <button class="iconbtn" id="printBtn" title="인쇄/PDF 저장">
    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  </button>
</div>

<div class="content">
  <div id="emptyState" class="hidden">
    <div class="card card-pad" style="text-align:center;">
      <div class="empty">아직 업로드된 데이터가 없습니다.</div>
      <a class="btn" href="upload.html" style="margin-top:6px;">업로드 페이지로 이동</a>
    </div>
  </div>

  <div id="dataState" class="hidden">
    <div class="subtabs">
      <button data-mode="weekly" class="active">주간보고</button>
      <button data-mode="monthly">월간보고</button>
    </div>

    <!-- 주간 -->
    <section id="mode-weekly">
      <div class="card card-pad">
        <div class="field-row">
          <div class="field"><label>기준 주차</label><select id="weekSelect"></select></div>
          <div class="field"><label>보고차수</label><input id="wkRound" placeholder="예: 제 12 주차"></div>
        </div>
      </div>
      <div class="kpi-grid" id="weeklyKpis"></div>

      <div class="section-title">금주 점검 실적 상위 지역 <span class="tag">금주점검건수 기준</span></div>
      <div class="section-title">금주 업체별 보고 내용</div>
      <div id="weeklyTextReports"></div>

      <div class="section-title">금주 점검 실적 상위 지역 <span class="tag">금주점검건수 기준</span></div>
      <div class="card"><div class="table-wrap" id="weeklyTop"></div></div>

      <div class="section-title">특이사항 / 이슈 <span class="tag">웹에서 직접 입력</span></div>
      <div class="card card-pad"><textarea class="note" id="wkIssue" placeholder="금주 특이사항을 입력하세요 (이 기기에 자동 저장)"></textarea></div>

      <div class="section-title">차주 계획 <span class="tag">웹에서 직접 입력</span></div>
      <div class="card card-pad"><textarea class="note" id="wkPlan" placeholder="차주 계획을 입력하세요 (이 기기에 자동 저장)"></textarea></div>
    </section>

    <!-- 월간 -->
    <section id="mode-monthly" class="hidden">
      <div class="card card-pad">
        <div class="field-row">
          <div class="field"><label>기준월</label><select id="monthSelect"></select></div>
        </div>
      </div>
      <div class="kpi-grid" id="monthlyKpis"></div>

      <div class="section-title">광역시도별 누적 통계 <span class="tag" id="monthLastDateTag"></span></div>
      <div class="card"><div class="table-wrap" id="monthlyTable"></div></div>

      <div class="section-title">이번 달 주차별 실적 추이</div>
      <div class="card"><div class="bars" id="monthWeeksBars"></div></div>

      <div class="section-title">금월 주요 실적 및 이슈</div>
      <div class="card card-pad"><textarea class="note" id="moIssue" placeholder="금월 주요 실적 및 이슈를 입력하세요 (이 기기에 자동 저장)"></textarea></div>

      <div class="section-title">차월 계획</div>
      <div class="card card-pad"><textarea class="note" id="moPlan" placeholder="차월 계획을 입력하세요 (이 기기에 자동 저장)"></textarea></div>
    </section>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>

<script src="assets/app.js"></script>
<script>
renderNav('report');
let ALL_WEEKS = [];
let CURRENT_WEEKLY_DATE = null;
let CURRENT_MONTH = null;

/* ---- notes (per-date, localStorage) ---- */
function noteKey(prefix, key) { return `kaba_note_${prefix}_${key}`; }
function loadNote(id, prefix, key) { $('#'+id).value = localStorage.getItem(noteKey(prefix, key)) || ''; }
function bindNote(id, prefix, getKey) {
  $('#'+id).addEventListener('input', e => localStorage.setItem(noteKey(prefix, getKey()), e.target.value));
}
bindNote('wkIssue', 'wk-issue', () => CURRENT_WEEKLY_DATE);
bindNote('wkPlan', 'wk-plan', () => CURRENT_WEEKLY_DATE);
bindNote('wkRound', 'wk-round', () => CURRENT_WEEKLY_DATE);
bindNote('moIssue', 'mo-issue', () => CURRENT_MONTH);
bindNote('moPlan', 'mo-plan', () => CURRENT_MONTH);

/* ---- weekly ---- */
async function renderWeekly(date) {
  CURRENT_WEEKLY_DATE = date;
  const snap = await DataLayer.getWeek(date);
  if (!snap) return;
  const t = totals(snap.regions);
  $('#weeklyKpis').innerHTML = [
    kpiCard('전체 대상건수', fmt(t.target)),
    kpiCard('전주 누적건수', fmt(t.prevWeek)),
    kpiCard('금주 점검건수', fmt(t.thisWeek)),
    kpiCard('금주 누적건수', fmt(t.cumulative)),
    kpiCard('진도율', pct(t.progress)),
    kpiCard('잔여건수', fmt(t.remain)),
  ].join('');

  // 업체별 텍스트 보고 표시 (금주실적만)
  const uploads = snap.companyUploads || {};
  const textHtml = Object.entries(uploads).map(([company, data]) => {
    const rt = data.reportText || {};
    const work = (rt.weeklyWork||'').replace('[입력]','').trim();
    if (!work) return '';
    return '<div class="card" style="margin-bottom:10px;">'
      + '<div class="card-h">' + company + ' <span class="meta">' + (data.uploadedAt||'').slice(0,10) + '</span></div>'
      + '<div class="card-pad">'
      + '<div style="font-size:11.5px;font-weight:800;color:var(--navy);margin-bottom:6px;">□ 금주 실적</div>'
      + '<div style="font-size:13px;white-space:pre-wrap;color:var(--text);line-height:1.7;">' + work + '</div>'
      + '</div></div>';
  }).join('');
  $('#weeklyTextReports').innerHTML = textHtml || '<div class="empty" style="font-size:13px;color:var(--muted);padding:10px 0;">업체별 보고 내용이 없습니다 (템플릿 시트1 금주실적이 여기 표시됩니다)</div>';

  // 추진계획 → 차주 계획 칸에 자동 표시 (비어있을 때만)
  // 차주 계획 auto-fill은 loadNote 이후에 처리 (아래 참고)
  const _planFromTemplate = Object.entries(uploads).map(([co, d]) => {
    const p = ((d.reportText||{}).plan||'').replace('[입력]','').trim();
    return p ? ('[' + co + ']\n' + p) : '';
  }).filter(Boolean).join('\n\n');

  const top = [...snap.regions].sort((a,b)=>b.thisWeek-a.thisWeek).filter(r=>r.thisWeek>0).slice(0,15);
  $('#weeklyTop').innerHTML = top.length ? `<table class="dt"><thead><tr>
      <th>시도</th><th>시군구</th><th>담당업체</th><th>금주점검</th><th>누적점검</th><th>진도율</th>
    </tr></thead><tbody>
    ${top.map(r=>`<tr><td>${r.sido}</td><td class="left">${r.sigungu}</td><td>${r.vendor||'-'}</td><td>${fmt(r.thisWeek)}</td><td>${fmt(r.cumulative)}</td><td>${pct(r.progress)}</td></tr>`).join('')}
    </tbody></table>` : `<div class="empty">금주 점검 실적이 입력된 지역이 없습니다</div>`;

  loadNote('wkIssue','wk-issue',date); loadNote('wkPlan','wk-plan',date); loadNote('wkRound','wk-round',date);
  // loadNote 이후 textarea가 비어있으면 템플릿의 추진계획으로 채움
  const wkPlanEl = $('#wkPlan');
  if (wkPlanEl && !wkPlanEl.value && _planFromTemplate) {
    wkPlanEl.value = _planFromTemplate;
  }
  $('#appSub').textContent = `기준일자 ${snap.baseDate} · ${snap.weekStart||''} ~ ${snap.weekEnd||''}`;
}

/* ---- monthly ---- */
function monthOf(dateStr){ return (dateStr||'').slice(0,7); } // YYYY-MM

async function buildMonthSelector() {
  const months = [...new Set(ALL_WEEKS.map(w=>monthOf(w.date)))].filter(Boolean).sort();
  const sel = $('#monthSelect');
  sel.innerHTML = months.map(m=>`<option value="${m}">${m}</option>`).join('');
  const def = months[months.length-1];
  sel.value = def;
  sel.addEventListener('change', ()=> renderMonthly(sel.value));
  return def;
}

async function renderMonthly(month) {
  CURRENT_MONTH = month;
  const weeksInMonth = ALL_WEEKS.filter(w => monthOf(w.date) === month).sort((a,b)=>a.date.localeCompare(b.date));
  if (weeksInMonth.length === 0) return;
  const lastDate = weeksInMonth[weeksInMonth.length-1].date;
  const lastSnap = await DataLayer.getWeek(lastDate);
  const firstSnap = await DataLayer.getWeek(weeksInMonth[0].date);
  const t = totals(lastSnap.regions);
  const monthThisWeekSum = lastSnap ? (t.cumulative - totals(firstSnap.regions).cumulative + totals(firstSnap.regions).thisWeek) : 0;

  $('#monthLastDateTag').textContent = `기준일자 ${lastDate}`;
  $('#monthlyKpis').innerHTML = [
    kpiCard('전체 대상건수', fmt(t.target)),
    kpiCard('월말 누적점검', fmt(t.cumulative), 'ok'),
    kpiCard('진도율', pct(t.progress)),
    kpiCard('잔여건수', fmt(t.remain)),
  ].join('');

  const sg = bySido(lastSnap.regions);
  $('#monthlyTable').innerHTML = `<table class="dt"><thead><tr>
      <th>시도</th><th>시군구수</th><th>대상건수</th><th>누적점검</th><th>진도율</th><th>정상</th><th>훼손</th><th>망실</th>
    </tr></thead><tbody>
    ${sg.map(m=>`<tr><td>${m.sido}</td><td>${m.count}</td><td>${fmt(m.target)}</td><td>${fmt(m.cumulative)}</td><td>${pct(m.progress)}</td><td>${fmt(m.normal)}</td><td>${fmt(m.damage)}</td><td>${fmt(m.lost)}</td></tr>`).join('')}
    <tr style="font-weight:800;background:#EAF2FA;"><td>합계</td><td>${t.count}</td><td>${fmt(t.target)}</td><td>${fmt(t.cumulative)}</td><td>${pct(t.progress)}</td><td>${fmt(t.normal)}</td><td>${fmt(t.damage)}</td><td>${fmt(t.lost)}</td></tr>
    </tbody></table>`;

  // 주차별 진도율 추이 막대 (각 주차 스냅샷 비동기 조회)
  const rows = [];
  for (const w of weeksInMonth) {
    const s = await DataLayer.getWeek(w.date);
    if (s) rows.push({date:w.date, t: totals(s.regions)});
  }
  $('#monthWeeksBars').innerHTML = rows.map(r => barRow(r.date, r.t.progress)).join('') || `<div class="empty">데이터가 없습니다</div>`;

  loadNote('moIssue','mo-issue',month); loadNote('moPlan','mo-plan',month);
}

/* ---- mode switch ---- */
$$('.subtabs button').forEach(b=>b.addEventListener('click', ()=>{
  $$('.subtabs button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const mode = b.dataset.mode;
  $('#mode-weekly').classList.toggle('hidden', mode!=='weekly');
  $('#mode-monthly').classList.toggle('hidden', mode!=='monthly');
}));

$('#printBtn').addEventListener('click', ()=> window.print());

(async function init(){
  renderNav('report');
  const sel = $('#weekSelect');
  const { weeks, current } = await buildWeekSelector(sel, renderWeekly);
  ALL_WEEKS = weeks;
  if (weeks.length === 0) { $('#emptyState').classList.remove('hidden'); return; }
  $('#dataState').classList.remove('hidden');
  await renderWeekly(current);
  const defMonth = await buildMonthSelector();
  await renderMonthly(defMonth);
})();
</script>
</body>
</html>
